<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Form</title>

  <style>
    body {
      font-family: Georgia, serif;
      background-color: #f5f0e8;
      color: #1a1208;
      margin: 0;
      padding: 0;
    }

    nav {
      background-color: #ede8dc;
      padding: 15px;
      text-align: right;
      border-bottom: 1px solid #b8a98a;
    }

    nav a {
      text-decoration: none;
      color: #8b3a1e;
      margin-left: 15px;
      font-size: 14px;
    }

    nav a:hover {
      color: #c47b2b;
    }

    .container {
      width: 70%;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      color: #1a1208;
      margin-bottom: 10px;
    }

    .line {
      width: 60px;
      height: 2px;
      background-color: #c47b2b;
      margin-bottom: 25px;
    }

    .form-box {
      background-color: #ede8dc;
      padding: 25px;
      border: 1px solid #b8a98a;
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #b8a98a;
      background-color: #f5f0e8;
      font-size: 14px;
    }

    textarea {
      height: 120px;
    }

    .options {
      margin-top: 10px;
    }

    .options label {
      display: block;
      margin: 5px 0;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #8b3a1e;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #c47b2b;
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="feedback.html">Feedback</a>
  </nav>

  <div class="container">

    <h1>Feedback Form</h1>

    <div class="line"></div>

    <div class="form-box">

      <form>

        <label for="name">Full Name</label>

        <input 
          type="text" 
          id="name" 
          placeholder="Enter your full name"
          required
          minlength="3"
          maxlength="50"
        >

        <label for="email">Email Address</label>

        <input 
          type="email" 
          id="email" 
          placeholder="Enter your email"
          required
        >

        <label>Rating</label>

        <div class="options">
          <label><input type="radio" name="rating"> Very Satisfied</label>
          <label><input type="radio" name="rating"> Satisfied</label>
          <label><input type="radio" name="rating"> Neutral</label>
          <label><input type="radio" name="rating"> Unsatisfied</label>
        </div>

        <label>Interests</label>

        <div class="options">
          <label><input type="checkbox"> Web Development</label>
          <label><input type="checkbox"> Mobile Development</label>
          <label><input type="checkbox"> AI & Machine Learning</label>
        </div>

        <label for="country">Country</label>

        <select id="country" required>
          <option value="">Select Country</option>
          <option>Nepal</option>
          <option>India</option>
          <option>United States</option>
        </select>

        <label for="message">Write your feedback here</label>

        <textarea 
          id="message"
          placeholder="Write your feedback..."
          required
          maxlength="300"
        ></textarea>

        <button type="submit">Submit</button>

      </form>

    </div>

  </div>

</body>
</html>
