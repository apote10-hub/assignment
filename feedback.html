<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Form</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <style>
    .form-title {
      color: #1a1208;
      margin-bottom: 10px;
    }
  </style>

</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="index.html">Ashra Pote</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>
        <li class="nav-item"><a class="nav-link" href="photos.html">Photos</a></li>
      </ul>
    </div>
  </div>
</nav>

  <div class="feedback-container">

    <h1 id="main-heading" class="form-title">Feedback Form</h1>

    <div class="line"></div>

    <p class="highlight">
      We value your feedback! Please fill out the form below.
    
      <span class="highlight-text">All fields marked are required.</span>
    </p>

    <div class="info-box">
      <p>Your feedback helps us improve. Thank you for taking the time to share your thoughts.</p>
    </div>

    <div class="content-div">
      <div class="form-box">
        <form>

          <label for="name">Full Name</label>

          <input
            type="text"
            id="name"
            placeholder="Enter your full name"
            required
            minlength="3"
            maxlength="50"
            style="border-color: #8b3a1e;"
          >

          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" required>

          <label>Rating</label>
          <div class="options">
            <label><input type="radio" name="rating"> Very Satisfied</label>
            <label><input type="radio" name="rating"> Satisfied</label>
            <label><input type="radio" name="rating"> Neutral</label>
            <label><input type="radio" name="rating"> Unsatisfied</label>
          </div>

          <label>Interests</label>
          <div class="options">
            <label><input type="checkbox"> Web Development</label>
            <label><input type="checkbox"> Mobile Development</label>
            <label><input type="checkbox"> AI & Machine Learning</label>
          </div>

          <label for="country">Country</label>
          <select id="country" required>
            <option value="">Select Country</option>
            <option>Nepal</option>
            <option>India</option>
            <option>United States</option>
          </select>

          <label for="message">Write your feedback here</label>
          <textarea
            id="message"
            placeholder="Write your feedback..."
            required
            maxlength="300"
          ></textarea>

          <button type="submit">Submit</button>

        </form>
      </div>
    </div>

  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
